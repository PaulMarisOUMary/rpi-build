# https://docs.docker.com/compose/how-tos/environment-variables/variable-interpolation/

x-common:
  args: &args-common
    DEBIAN_VERSION: ${DOCKER_DEBIAN_VERSION:-trixie}

services:
  # docker compose build --no-cache image-gen
  # docker compose run --rm image-gen
  image-gen:
    build:
      context: .
      dockerfile: docker/image-gen.Dockerfile
      args:
        <<: *args-common
        RPI_IMAGE_GEN_VERSION: ${DOCKER_RPI_IMAGE_GEN_VERSION:-master}
    image: rpi-image-gen:local
    container_name: image-gen
    privileged: true
    volumes:
      - ./target/${TARGET_FOLDER:?}:/workspace/build:ro
      - build-workspace:/workspace/work:rw
    command: >-
      build
      -S ./build
      -c ./build/config/${TARGET_CONFIG:?}
      -B /workspace/work
      ${EXTRA_ARGS:-}
      --
      IGconf_image_name="${IMAGE_NAME:?}"
      IGconf_device_hostname="${DEVICE_HOSTNAME:?}"
      IGconf_device_user1="${DEVICE_USERNAME:?}"
      IGconf_device_user1pass="${DEVICE_PASSWORD:?}"
      IGconf_iwd_ssid="${WIFI_SSID:-}"
      IGconf_iwd_passphrase="${WIFI_PASSPHRASE:-}"

  # docker compose build --no-cache sandbox
  # docker compose run --rm sandbox import
  # docker compose run --rm sandbox run
  sandbox:
    build:
      context: .
      dockerfile: docker/sandbox.Dockerfile
      args: *args-common
    image: rpi-sandbox:local
    container_name: sandbox
    privileged: true
    environment:
      SANDBOX_ARTIFACT_CONTEXT: ${SANDBOX_ARTIFACT_CONTEXT:?}
      SANDBOX_ARTIFACT_NAME: ${SANDBOX_ARTIFACT_NAME:?}
      SANDBOX_IMAGE_NAME: ${SANDBOX_IMAGE_NAME:-${SANDBOX_ARTIFACT_CONTEXT}}
      SANDBOX_DIR_CONTEXT: ${SANDBOX_DIR_CONTEXT:-}
    volumes:
      - build-workspace:/workspace:ro
      - sandbox-storage:/var/lib/containers:rw
    stdin_open: true
    tty: true

volumes:
  build-workspace:
  sandbox-storage: