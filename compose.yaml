# docker-compose.yml
services:
  rpi-image-gen:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEBIAN_VERSION: "trixie"
        RPI_IMAGE_GEN_VERSION: "master"
    image: rpi-image-gen-tool:local
    container_name: rpi-image-gen
    privileged: true
    volumes:
      - work-data:/workspace/work:rw

volumes:
  work-data: