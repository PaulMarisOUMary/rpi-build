# METABEGIN
# X-Env-Layer-Name: rpi3-slim-device
# X-Env-Layer-Category: device
# X-Env-Layer-Desc: Device layer for Raspberry Pi 3 Model B / B+ / A+ and
#  Compute Module 3 / 3+ (BCM2837 / BCM2837B0 family). Trims kernel DTBs and
#  WiFi/Bluetooth firmware to this board family only. Declares the asset dir
#  so that overlays and hooks are found.
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Requires: device-base
# X-Env-Layer-Provides: device,rpi-device
#
# X-Env-VarPrefix: device
#
# X-Env-Var-class: pi3
#
# X-Env-Var-assetdir: ${DIRECTORY}
# X-Env-Var-assetdir-Desc: Directory for device assets
# X-Env-Var-assetdir-Required: n
# X-Env-Var-assetdir-Valid: dir
# X-Env-Var-assetdir-Set: y
# METAEND
---
mmdebstrap:
  packages:
    - raspi-firmware
    - linux-image-rpi-v8
    - firmware-brcm80211
  dpkgopts:
    - path-exclude=/usr/share/doc/raspi-firmware/
    - path-include=/usr/share/doc/raspi-firmware/copyright
    - path-exclude=/usr/lib/linux-image-*-v8/broadcom/bcm2711*
    - path-exclude=/usr/lib/linux-image-*-v8/broadcom/bcm2712*
    - path-exclude=/usr/share/doc/firmware-brcm80211/
    - path-include=/usr/share/doc/firmware-brcm80211/copyright
    - path-exclude=/usr/lib/firmware/cypress/*
    - path-include=/usr/lib/firmware/cypress/cyfmac43430*
    - path-include=/usr/lib/firmware/cypress/cyfmac43455*
    - path-exclude=/usr/lib/firmware/brcm/*
    - path-include=/usr/lib/firmware/brcm/brcmfmac43430-sdio.raspberrypi,3*
    - path-include=/usr/lib/firmware/brcm/brcmfmac43430-sdio.txt
    - path-include=/usr/lib/firmware/brcm/brcmfmac43455-sdio.raspberrypi,3*
    - path-include=/usr/lib/firmware/brcm/brcmfmac43455-sdio.txt
    - path-include=/usr/lib/firmware/brcm/BCM43430A1.raspberrypi,3*
    - path-include=/usr/lib/firmware/brcm/BCM4345C0.raspberrypi,3*
  customize-hooks:
    - mkdir -p $1/boot/firmware
    - ln -sf firmware/overlays $1/boot/overlays
    - install -m 644 ${IGconf_device_assetdir}/cmdline.txt $1/boot/firmware/
    - install -m 644 ${IGconf_device_assetdir}/config.txt $1/boot/firmware/
    - mkdir -p $1/etc/systemd/network
    - $LAYER_HOOKS/systemd/netgen '*' > $1/etc/systemd/network/99-default.network
